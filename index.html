<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Carteira · Platina Extintores</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #C0392B;
  --red-light: #FAECE7;
  --dark: #1A1A2E;
  --green: #1D9E75;
  --green-bg: #E1F5EE;
  --amber: #BA7517;
  --amber-bg: #FAEEDA;
  --blue: #185FA5;
  --blue-bg: #E6F1FB;
  --gray: #5F5E5A;
  --gray-bg: #F1EFE8;
  --border: #E0DED7;
  --bg: #F7F6F2;
  --surface: #FFFFFF;
  --text: #1A1A2E;
  --text-2: #5F5E5A;
  --text-3: #9C9A92;
  --danger: #E24B4A;
  --danger-bg: #FCEBEB;
  --radius: 10px;
  --radius-sm: 6px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; min-height: 100vh; }

/* HEADER */
.header { background: var(--dark); padding: 0 2rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header-brand { display: flex; align-items: center; gap: 10px; }
.brand-icon { width: 28px; height: 28px; background: var(--red); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
.brand-icon svg { width: 16px; height: 16px; fill: white; }
.brand-name { font-size: 14px; font-weight: 600; color: white; letter-spacing: .02em; }
.brand-sub { font-size: 11px; color: rgba(255,255,255,.45); margin-left: 2px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.last-update { font-size: 11px; color: rgba(255,255,255,.4); }
.btn-refresh { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15); color: white; border-radius: var(--radius-sm); padding: 5px 12px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background .15s; }
.btn-refresh:hover { background: rgba(255,255,255,.18); }
.btn-refresh svg { width: 13px; height: 13px; fill: none; stroke: white; stroke-width: 2; }

/* LAYOUT */
.main { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1.5rem 3rem; }

/* FILTROS */
.filters { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.filter-label { font-size: 12px; color: var(--text-2); }
.filter-select { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 10px; font-size: 12px; color: var(--text); cursor: pointer; }
.filter-select:focus { outline: none; border-color: var(--red); }
.filter-date { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 5px 10px; font-size: 12px; color: var(--text); cursor: pointer; }
.filter-date:focus { outline: none; border-color: var(--red); }
.badge-live { display: flex; align-items: center; gap: 5px; background: var(--green-bg); color: var(--green); border-radius: 20px; padding: 4px 10px; font-size: 11px; font-weight: 500; margin-left: auto; }
.dot-live { width: 7px; height: 7px; background: var(--green); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.filter-separator { width: 1px; height: 20px; background: var(--border); }

/* MÉTRICAS */
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: .875rem 1rem; }
.metric.highlight { border-left: 3px solid var(--green); }
.metric.highlight-warn { border-left: 3px solid var(--danger); }
.metric.highlight-blue { border-left: 3px solid var(--blue); }
.metric.highlight-amber { border-left: 3px solid var(--amber); }
.metric-label { font-size: 11px; color: var(--text-3); font-weight: 500; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
.metric-value { font-size: 28px; font-weight: 600; color: var(--text); line-height: 1; margin-bottom: 4px; }
.metric-value.green { color: var(--green); }
.metric-value.red { color: var(--danger); }
.metric-value.blue { color: var(--blue); }
.metric-value.amber { color: var(--amber); }
.metric-sub { font-size: 11px; color: var(--text-3); }

/* SEÇÕES */
.section-title { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .07em; margin-bottom: .75rem; margin-top: 1.75rem; display: flex; align-items: center; gap: 8px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* FUNIL */
.funnel-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
.funnel-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.funnel-row:last-child { margin-bottom: 0; }
.funnel-name { font-size: 12px; color: var(--text-2); min-width: 150px; }
.funnel-track { flex: 1; background: var(--bg); border-radius: 4px; height: 28px; overflow: hidden; }
.funnel-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 10px; font-size: 11px; font-weight: 600; color: white; transition: width .7s cubic-bezier(.4,0,.2,1); min-width: 36px; }
.funnel-n { font-size: 13px; font-weight: 600; color: var(--text); min-width: 40px; text-align: right; }
.funnel-pct { font-size: 11px; color: var(--text-3); min-width: 56px; text-align: right; }

/* GRID */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
@media(max-width:640px){ .grid2{ grid-template-columns:1fr; } .metrics-grid{ grid-template-columns:1fr 1fr; } }

/* CARDS */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
.chart-wrap { position: relative; width: 100%; }

/* VENDEDOR */
.seller-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; padding-bottom: .75rem; border-bottom: 1px solid var(--border); }
.avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; }
.av-blue { background: var(--blue-bg); color: var(--blue); }
.av-amber{ background: var(--amber-bg); color: var(--amber); }
.seller-name { font-size: 14px; font-weight: 600; color: var(--text); }
.seller-region { font-size: 11px; color: var(--text-3); }
.kpi-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.kpi-row:last-child { border-bottom: none; }
.kpi-key { color: var(--text-2); }
.kpi-val { font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 6px; }
.pill { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; }
.p-green { background: var(--green-bg); color: var(--green); }
.p-amber { background: var(--amber-bg); color: var(--amber); }
.p-gray { background: var(--gray-bg); color: var(--gray); }
.p-red { background: var(--danger-bg); color: var(--danger);}
.p-blue { background: var(--blue-bg); color: var(--blue); }

/* LOADING / ERROR */
.state-msg { text-align: center; padding: 3rem; color: var(--text-3); font-size: 13px; }
.spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* FOOTER */
.footer { margin-top: 2rem; padding: 1rem 0; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-3); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
code { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-size: 11px; font-family: monospace; }

/* VALOR TOTAL */
.valor-total { font-size: 22px; font-weight: 700; }
</style>
</head>
<body>

<header class="header">
  <div class="header-brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L4 7v10l8 5 8-5V7L12 2z"/></svg>
    </div>
    <div>
      <span class="brand-name">Platina Extintores</span>
      <span class="brand-sub">Carteira</span>
    </div>
  </div>
  <div class="header-right">
    <span class="last-update" id="last-update">—</span>
    <button class="btn-refresh" onclick="loadData()">
      <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Atualizar
    </button>
  </div>
</header>

<main class="main">
  <div class="filters">
    <span class="filter-label">Período:</span>
    <select class="filter-select" id="filter-period" onchange="onPeriodChange()">
      <option value="all">Toda a base</option>
      <option value="30" selected>Últimos 30 dias</option>
      <option value="60">Últimos 60 dias</option>
      <option value="90">Últimos 90 dias</option>
      <option value="custom">Personalizado</option>
    </select>
    <span id="custom-date-wrapper" style="display:none;align-items:center;gap:6px">
      <input type="date" class="filter-date" id="date-from" onchange="loadData()">
      <span class="filter-label">até</span>
      <input type="date" class="filter-date" id="date-to" onchange="loadData()">
    </span>
    <div class="filter-separator"></div>
    <span class="filter-label">Vendedor:</span>
    <select class="filter-select" id="filter-seller" onchange="loadData()">
      <option value="all">Todos</option>
      <option value="RONALDO CESAR CAPRINO LEME">Ronaldo</option>
      <option value="DAVID FAGUNDES">David</option>
    </select>
    <span class="badge-live"><span class="dot-live"></span>Tempo real</span>
  </div>

  <div id="app-content">
    <div class="state-msg"><div class="spinner"></div>Carregando dados...</div>
  </div>
</main>

<script>
const SUPABASE_URL = 'https://qraqfioyecspugrjlyqv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFyYXFmaW95ZWNzcHVncmpseXF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNjA3MzYsImV4cCI6MjA5NjgzNjczNn0.6J4gUPWTTfQ4Tn8NPbpdxZ0RoMrcKdGDaJo0tMAUCno';

let chartTrend = null;
let chartSellers = null;

function onPeriodChange() {
  const v = document.getElementById('filter-period').value;
  const w = document.getElementById('custom-date-wrapper');
  w.style.display = v === 'custom' ? 'flex' : 'none';
  if (v !== 'custom') loadData();
}

async function fetchContacts(period, seller) {
  let url = `${SUPABASE_URL}/rest/v1/contacts?select=status,follow_count,vendedor_nome,data_disparo,data_ultimo_contato,valor_orcamento`;

  const filters = [];

  if (seller !== 'all') filters.push(`vendedor_nome=eq.${encodeURIComponent(seller)}`);

  if (period === 'custom') {
    const from = document.getElementById('date-from').value;
    const to = document.getElementById('date-to').value;
    if (from) filters.push(`data_disparo=gte.${from}`);
    if (to) filters.push(`data_disparo=lte.${to}`);
  } else if (period !== 'all') {
    const cutoff = new Date(Date.now() - Number(period) * 86400000).toISOString();
    filters.push(`data_disparo=gte.${cutoff}`);
  }

  if (filters.length) url += '&' + filters.join('&');
  url += '&limit=2000';

  const res = await fetch(url, {
    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
  });
  if (!res.ok) throw new Error(`Supabase: ${res.status}`);
  return res.json();
}

function fmtBRL(v) {
  if (!v && v !== 0) return '—';
  return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 2 }).format(v);
}

function calcMetrics(rows) {
  const total = rows.length;
  // Enviados = e-mails que efetivamente saíram (excluindo pendente e processando)
  const enviados = rows.filter(r => ['enviado','respondido','expirado','bounce'].includes(r.status)).length;
  const respondidos = rows.filter(r => r.status === 'respondido').length;
  const bounces = rows.filter(r => r.status === 'bounce').length;
  const expirados = rows.filter(r => r.status === 'expirado').length;
  // valor_orcamento é numeric no Supabase — garantir conversão correta
  const valorTotal = rows.reduce((acc, r) => acc + (Number(r.valor_orcamento) || 0), 0);

  const bySeller = ['DAVID FAGUNDES', 'RONALDO CESAR CAPRINO LEME'].map(nome => {
    const sub = rows.filter(r => r.vendedor_nome === nome);
    return {
      nome,
      label: nome === 'DAVID FAGUNDES' ? 'David' : 'Ronaldo',
      av: nome === 'DAVID FAGUNDES' ? 'DA' : 'RO',
      avcls: nome === 'DAVID FAGUNDES' ? 'av-amber' : 'av-blue',
      region: nome === 'DAVID FAGUNDES' ? 'DDD 15 · Sorocaba e Votorantim' : 'DDD 11 · raio 100km de Sorocaba',
      total: sub.length,
      enviados: sub.filter(r => ['enviado','respondido','expirado','bounce'].includes(r.status)).length,
      respondidos: sub.filter(r => r.status === 'respondido').length,
      bounces: sub.filter(r => r.status === 'bounce').length,
      expirados: sub.filter(r => r.status === 'expirado').length,
      valor: sub.reduce((acc, r) => acc + (Number(r.valor_orcamento) || 0), 0),
    };
  });

  const byFollowup = [0,1,2,3,4].map(n => ({
    n,
    total: rows.filter(r => r.follow_count === n).length,
    respondidos: rows.filter(r => r.follow_count === n && r.status === 'respondido').length,
  }));

  return { total, enviados, respondidos, bounces, expirados, valorTotal, bySeller, byFollowup };
}

function pct(a, b) { return b ? (a / b * 100).toFixed(1) + '%' : '—'; }
function renderPill(text, cls) { return `<span class="pill ${cls}">${text}</span>`; }

function buildCharts(m) {
  const labels = ['Disparo inicial', 'Follow-up 1', 'Follow-up 2', 'Follow-up 3', 'Follow-up 4'];
  const totalData = m.byFollowup.map(f => f.total);
  const respData = m.byFollowup.map(f => f.respondidos);

  if (chartTrend) chartTrend.destroy();
  chartTrend = new Chart(document.getElementById('chartTrend'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Total', data: totalData, backgroundColor: '#378ADD55', borderColor: '#378ADD', borderWidth: 1.5 },
        { label: 'Respondidos', data: respData, backgroundColor: '#1D9E7555', borderColor: '#1D9E75', borderWidth: 1.5 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#9C9A92', font: { size: 11 } }, grid: { color: 'rgba(0,0,0,.06)' } },
        y: { ticks: { color: '#9C9A92', font: { size: 11 } }, grid: { color: 'rgba(0,0,0,.06)' }, beginAtZero: true }
      }
    }
  });

  if (chartSellers) chartSellers.destroy();
  const s = m.bySeller;
  chartSellers = new Chart(document.getElementById('chartSellers'), {
    type: 'bar',
    data: {
      labels: ['Disparados', 'Enviados', 'Respondidos', 'Bounces', 'Expirados'],
      datasets: [
        { label: 'David', data: [s[0].total, s[0].enviados, s[0].respondidos, s[0].bounces, s[0].expirados], backgroundColor: '#BA751755', borderColor: '#BA7517', borderWidth: 1.5 },
        { label: 'Ronaldo', data: [s[1].total, s[1].enviados, s[1].respondidos, s[1].bounces, s[1].expirados], backgroundColor: '#185FA555', borderColor: '#185FA5', borderWidth: 1.5 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#9C9A92', font: { size: 11 } }, grid: { color: 'rgba(0,0,0,.06)' } },
        y: { ticks: { color: '#9C9A92', font: { size: 11 } }, grid: { color: 'rgba(0,0,0,.06)' }, beginAtZero: true }
      }
    }
  });
}

function renderLegend(id, items) {
  document.getElementById(id).innerHTML = items.map(([c, l]) =>
    `<span style="display:flex;align-items:center;gap:5px">
      <span style="width:10px;height:10px;border-radius:2px;background:${c}"></span>
      <span style="font-size:12px;color:#5F5E5A">${l}</span>
    </span>`
  ).join('');
}

function renderApp(m) {
  const pendentes = m.total - m.enviados - m.bounces;
  const funnel = [
    { label: 'Disparados (total)', n: m.total, base: m.total, color: '#378ADD' },
    { label: 'E-mails entregues', n: m.enviados, base: m.total, color: '#1D9E75' },
    { label: 'Pendentes / processando', n: Math.max(0, pendentes), base: m.total, color: '#9C9A92' },
    { label: 'Bounces (falha de entrega)', n: m.bounces, base: m.total, color: '#E24B4A' },
    { label: 'Respondidos', n: m.respondidos, base: m.enviados, color: '#BA7517' },
    { label: 'Expirados (sem resposta)', n: m.expirados, base: m.enviados, color: '#C4C2BA' },
  ];

  document.getElementById('app-content').innerHTML = `
    <div class="metrics-grid">
      <div class="metric">
        <div class="metric-label">Disparados</div>
        <div class="metric-value">${m.total}</div>
        <div class="metric-sub">total da campanha</div>
      </div>
      <div class="metric highlight-blue">
        <div class="metric-label">Enviados (Entregues)</div>
        <div class="metric-value blue">${m.enviados}</div>
        <div class="metric-sub">${pct(m.enviados, m.total)} dos disparados</div>
      </div>
      <div class="metric highlight">
        <div class="metric-label">Respondidos</div>
        <div class="metric-value green">${m.respondidos}</div>
        <div class="metric-sub">${pct(m.respondidos, m.enviados)} dos enviados</div>
      </div>
      <div class="metric highlight-warn">
        <div class="metric-label">Bounces</div>
        <div class="metric-value red">${m.bounces}</div>
        <div class="metric-sub">${pct(m.bounces, m.enviados)} dos enviados</div>
      </div>
      <div class="metric">
        <div class="metric-label">Expirados</div>
        <div class="metric-value">${m.expirados}</div>
        <div class="metric-sub">sem resposta após FUP4</div>
      </div>
      <div class="metric highlight-amber">
        <div class="metric-label">Valor Total</div>
        <div class="metric-value amber" style="font-size:18px">${fmtBRL(m.valorTotal)}</div>
        <div class="metric-sub">em orçamentos</div>
      </div>
    </div>

    <div class="section-title">Funil de entregas</div>
    <div class="funnel-card">
      ${funnel.map(f => {
        const w = f.base ? Math.max(3, Math.round(f.n / f.base * 100)) : 3;
        return `<div class="funnel-row">
          <span class="funnel-name">${f.label}</span>
          <div class="funnel-track">
            <div class="funnel-fill" style="width:${w}%;background:${f.color}">${pct(f.n, f.base)}</div>
          </div>
          <span class="funnel-n">${f.n}</span>
        </div>`;
      }).join('')}
    </div>

    <div class="section-title">Resultado por follow-up</div>
    <div class="card" style="margin-bottom:1rem">
      <div class="chart-wrap" style="height:220px"><canvas id="chartTrend"></canvas></div>
    </div>
    <div id="legend-trend" style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:1.5rem"></div>

    <div class="section-title">Desempenho por vendedor</div>
    <div class="grid2" style="margin-bottom:1rem">
      ${m.bySeller.map(sv => `
        <div class="card">
          <div class="seller-header">
            <div class="avatar ${sv.avcls}">${sv.av}</div>
            <div>
              <div class="seller-name">${sv.label}</div>
              <div class="seller-region">${sv.region}</div>
            </div>
          </div>
          <div class="kpi-row"><span class="kpi-key">Valor em orçamentos</span><span class="kpi-val" style="color:var(--amber);font-weight:700">${fmtBRL(sv.valor)}</span></div>
          <div class="kpi-row"><span class="kpi-key">Disparados</span><span class="kpi-val">${sv.total}</span></div>
          <div class="kpi-row"><span class="kpi-key">Enviados (Entregues)</span><span class="kpi-val">${sv.enviados} ${renderPill(pct(sv.enviados, sv.total), 'p-blue')}</span></div>
          <div class="kpi-row"><span class="kpi-key">Respondidos</span><span class="kpi-val">${sv.respondidos} ${renderPill(pct(sv.respondidos, sv.enviados), 'p-green')}</span></div>
          <div class="kpi-row"><span class="kpi-key">Bounces</span><span class="kpi-val">${sv.bounces} ${renderPill(pct(sv.bounces, sv.enviados), 'p-red')}</span></div>
          <div class="kpi-row"><span class="kpi-key">Expirados</span><span class="kpi-val">${sv.expirados} ${renderPill(pct(sv.expirados, sv.enviados), 'p-gray')}</span></div>
        </div>
      `).join('')}
    </div>

    <div class="card" style="margin-bottom:.5rem">
      <div class="chart-wrap" style="height:200px"><canvas id="chartSellers"></canvas></div>
    </div>
    <div id="legend-sellers" style="display:flex;gap:16px;margin-bottom:2rem"></div>

    <div class="footer">
      <span>Dados em tempo real via API Supabase · tabela <code>contacts</code></span>
      <span>E-mails abertos: não rastreado</span>
    </div>
  `;

  buildCharts(m);
  renderLegend('legend-trend', [['#378ADD', 'Total'], ['#1D9E75', 'Respondidos']]);
  renderLegend('legend-sellers', [['#BA7517', 'David'], ['#185FA5', 'Ronaldo']]);
}

async function loadData() {
  const period = document.getElementById('filter-period')?.value || 'all';
  const seller = document.getElementById('filter-seller')?.value || 'all';
  document.getElementById('app-content').innerHTML = '<div class="state-msg"><div class="spinner"></div>Carregando dados...</div>';
  try {
    const rows = await fetchContacts(period, seller);
    const m = calcMetrics(rows);
    renderApp(m);
    document.getElementById('last-update').textContent =
      'Atualizado ' + new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  } catch (e) {
    document.getElementById('app-content').innerHTML =
      `<div class="state-msg">Erro ao carregar dados: ${e.message}</div>`;
  }
}

// Inicializa datas do filtro personalizado com hoje
const today = new Date().toISOString().split('T')[0];
const thirtyDaysAgo = new Date(Date.now() - 30 * 86400000).toISOString().split('T')[0];
document.getElementById('date-from').value = thirtyDaysAgo;
document.getElementById('date-to').value = today;

loadData();
</script>
</body>
</html>
