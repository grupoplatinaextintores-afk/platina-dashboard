<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redefinir senha · Carteira Platina</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14171a; --surface: #1c2024; --border: #2a2f35;
    --text: #eef1f3; --text-2: #8f9aa3; --red: #d1453d;
    --warn: #e0a721; --radius: 14px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 0%, #1a1e22 0%, var(--bg) 60%);
    font-family: 'Inter', sans-serif; color: var(--text);
  }
  .card {
    width: 100%; max-width: 340px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 2rem 1.75rem 1.75rem; box-shadow: 0 20px 50px -20px rgba(0,0,0,0.6);
  }
  .brand {
    text-align: center; font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 20px; letter-spacing: -0.02em; margin: 0;
  }
  .brand span { color: var(--red); }
  .subtitle { text-align: center; font-size: 12.5px; color: var(--text-2); margin: 4px 0 1.75rem; }
  .field { margin-bottom: 1rem; }
  .field label {
    display: block; font-size: 11.5px; font-weight: 600; color: var(--text-2);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;
  }
  .field input {
    width: 100%; padding: 10px 12px; background: #14171a; border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); font-size: 14px; font-family: 'Inter', sans-serif;
  }
  .field input:focus { outline: none; border-color: var(--red); }
  .btn {
    width: 100%; padding: 11px; margin-top: 4px; background: var(--red); color: white;
    border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
    font-family: 'Inter', sans-serif; cursor: pointer;
  }
  .btn:hover { filter: brightness(1.1); }
  .btn:disabled { opacity: .55; cursor: not-allowed; }
  .result { margin-top: 14px; font-size: 13px; text-align: center; min-height: 18px; line-height: 1.4; }
  .result.ok { color: #4caf7d; }
  .result.warn { color: var(--warn); }
  .result.error { color: var(--red); }
</style>
</head>
<body>
  <div class="card">
    <h1 class="brand">Nova <span>senha</span></h1>
    <p class="subtitle">Carteira Platina · Redefinição de acesso</p>

    <div class="field">
      <label>Nova senha</label>
      <input type="password" id="nova-senha" placeholder="Mínimo 6 caracteres">
    </div>
    <div class="field">
      <label>Confirmar nova senha</label>
      <input type="password" id="confirmar-senha" placeholder="Repita a senha">
    </div>
    <button class="btn" id="btn-salvar" onclick="salvarSenha()">Salvar nova senha</button>
    <div class="result" id="result"></div>
  </div>

<script>
  const SUPABASE_URL = 'https://qraqfioyecspugrjlyqv.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFyYXFmaW95ZWNzcHVncmpseXF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNjA3MzYsImV4cCI6MjA5NjgzNjczNn0.6J4gUPWTTfQ4Tn8NPbpdxZ0RoMrcKdGDaJo0tMAUCno';
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const resultEl = document.getElementById('result');

  function setResult(text, cls) {
    resultEl.textContent = text;
    resultEl.className = 'result' + (cls ? ' ' + cls : '');
  }

  async function salvarSenha() {
    const novaSenha = document.getElementById('nova-senha').value;
    const confirmar = document.getElementById('confirmar-senha').value;

    if (novaSenha.length < 6) {
      setResult('A senha precisa ter no mínimo 6 caracteres.', 'warn');
      return;
    }
    if (novaSenha !== confirmar) {
      setResult('As senhas não coincidem.', 'warn');
      return;
    }

    const { error } = await client.auth.updateUser({ password: novaSenha });
    setResult(
      error ? 'Erro: ' + error.message : 'Senha atualizada! Você já pode fazer login.',
      error ? 'error' : 'ok'
    );
  }
</script>
</body>
</html>
